<!DOCTYPE html>
<html lang="ar">
<head>

<title>دعم وتبرعات</title>

<style>

body{

}

.box{

border-radius:12px;

}

.card{

.share{

img{

}

a{

</style>

<script>

function sharePage(){
if (navigator.share){
navigator.share({
title:"صفحة التبرعات",
url:window.location.href
});
}else{
alert("انسخ الرابط وشاركه مع أصدقائك");
}
}

</script>

</head>

</a>

</div>

<div class="card">

</p>

</div>

</body>
</html>
