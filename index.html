<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💰 دعم وتبرعات</title>

<meta property="og:title" content="💰 دعم وتبرعات">
<meta property="og:description" content="إذا حبيت تدعمني أو تساهم بتبرع ❤️">
<meta property="og:image" content="https://00vem.github.io/437B091F-6A30-443E-A48C-087AF0D53636.png">
<meta property="og:type" content="website">
<meta property="og:url" content="https://00vem.github.io/">

<meta name="twitter:card" content="summary_large_image">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Cairo',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
text-align:center;
padding:30px;
direction:rtl;
}

.container{
max-width:520px;
margin:auto;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #38bdf8;
}

.goal{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-top:20px;
}

.progress{
background:#334155;
border-radius:20px;
overflow:hidden;
height:20px;
margin-top:15px;
}

.progress-bar{
height:100%;
background:#22c55e;
width:0%;
transition:1s;
}

.stats{
display:flex;
justify-content:space-around;
margin-top:10px;
}

.card{
background:#1e293b;
padding:20px;
margin-top:15px;
border-radius:15px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

.share{
background:#38bdf8;
margin-top:20px;
}

.qr{
width:180px;
margin-top:10px;
}

.donors-list{
background:#1e293b;
margin-top:20px;
padding:15px;
border-radius:15px;
}

.admin{
background:#111827;
margin-top:20px;
padding:15px;
border-radius:15px;
}

.notification{
position:fixed;
top:20px;
right:20px;
background:#22c55e;
padding:15px;
border-radius:10px;
display:none;
}

</style>

</head>

<body>

<div class="notification" id="notify">
🎉 وصل تبرع جديد!
</div>

<div class="container">

<img class="avatar" src="https://00vem.github.io/437B091F-6A30-443E-A48C-087AF0D53636.png">

<h1>💰 دعم وتبرعات</h1>

<p>إذا حبيت تدعمني ❤️</p>

<div class="goal">

<h3>🎯 هدف التبرعات 500$</h3>

<div class="stats">

<div>
<b id="donations">0$</b>
<p>المبلغ</p>
</div>

<div>
<b id="donors">0</b>
<p>المتبرعين</p>
</div>

</div>

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

</div>

<div class="card">

<h3>ZainCash</h3>

<img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=07717980579">

<button onclick="donate()">تبرعت</button>

</div>

<div class="card">

<h3>PayPal</h3>

<a href="https://paypal.me/ali2019">

<button>الدفع عبر PayPal</button>

</a>

</div>

<div class="donors-list">

<h3>👥 قائمة المتبرعين</h3>

<ul id="list"></ul>

</div>

<div class="admin">

<h3>⚙️ لوحة التحكم</h3>

<input id="name" placeholder="اسم المتبرع">

<input id="amount" placeholder="المبلغ">

<button onclick="addDonation()">إضافة تبرع</button>

<button onclick="resetData()">تصفير البيانات</button>

</div>

<button class="share" onclick="sharePage()">📤 مشاركة الصفحة</button>

</div>

<script>

let goal = 500

let donations = localStorage.getItem("donations") || 0
let donors = localStorage.getItem("donors") || 0
let list = JSON.parse(localStorage.getItem("list") || "[]")

update()

function donate(){

let name = prompt("اسمك؟")
let amount = prompt("المبلغ؟")

if(name && amount){

add(name,amount)

}

}

function addDonation(){

let name=document.getElementById("name").value
let amount=document.getElementById("amount").value

if(name && amount){

add(name,amount)

}

}

function add(name,amount){

donations = Number(donations) + Number(amount)
donors++

list.push(name + " - $" + amount)

localStorage.setItem("donations",donations)
localStorage.setItem("donors",donors)
localStorage.setItem("list",JSON.stringify(list))

notify()

update()

}

function update(){

document.getElementById("donations").innerText=donations+"$"
document.getElementById("donors").innerText=donors

let percent=(donations/goal)*100

document.getElementById("bar").style.width=percent+"%"

let ul=document.getElementById("list")

ul.innerHTML=""

list.slice().reverse().forEach(d=>{
let li=document.createElement("li")
li.innerText=d
ul.appendChild(li)
})

}

function notify(){

let n=document.getElementById("notify")

n.style.display="block"

setTimeout(()=>{
n.style.display="none"
},3000)

}

function resetData(){

localStorage.clear()

location.reload()

}

function sharePage(){

if(navigator.share){

navigator.share({
title:"صفحة التبرعات",
url:window.location.href
})

}else{

alert("انسخ الرابط وشاركه")

}

}

</script>

</body>
</html>
