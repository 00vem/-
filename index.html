<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>دعم وتبرعات</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:30px;
direction:rtl;
}

.container{
max-width:500px;
margin:auto;
}

.header{
margin-bottom:20px;
}

.header h1{
font-size:28px;
}

.progress{
background:#1e293b;
border-radius:20px;
overflow:hidden;
height:20px;
margin:20px 0;
}

.progress-bar{
height:100%;
width:30%;
background:#22c55e;
}

.card{
background:#1e293b;
padding:20px;
margin-top:15px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.icon{
width:40px;
margin-bottom:10px;
}

button{
margin-top:10px;
padding:12px 20px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
font-size:16px;
}

.share{
background:#38bdf8;
margin-top:20px;
}

.qr{
width:200px;
margin-top:10px;
border-radius:10px;
}

a{
text-decoration:none;
}

</style>

<script>

function sharePage(){
if (navigator.share){
navigator.share({
title:"صفحة التبرعات",
url:window.location.href
});
}else{
alert("انسخ الرابط وشاركه مع أصدقائك");
}
}

</script>

</head>

<body>

<div class="container">

<div class="header">

<h1>💰 دعم وتبرعات</h1>

<p>إذا حبيت تدعمني أو تساهم بتبرع ❤️</p>

<p style="color:#38bdf8;font-size:18px;">
مبلغ التبرع: أي مبلغ هدية
</p>

<div class="progress">
<div class="progress-bar"></div>
</div>

</div>

<div class="card">

<img class="icon" src="https://cdn-icons-png.flaticon.com/512/5968/5968299.png">

<h3>ZainCash</h3>

<p>امسح الباركود للتبرع</p>

<img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=07717980579">

<br>

<a href="tel:07717980579">
<button>تحويل الآن</button>
</a>

</div>

<div class="card">

<img class="icon" src="https://cdn-icons-png.flaticon.com/512/3135/3135706.png">

<h3>سوبر كي</h3>

<p>رقم سوبر كي</p>

<p style="font-size:18px;">9924257364</p>

</div>

<div class="card">

<img class="icon" src="https://cdn-icons-png.flaticon.com/512/174/174861.png">

<h3>PayPal</h3>

<a href="https://paypal.me/ali2019">
<button>الدفع عبر PayPal</button>
</a>

</div>

<button class="share" onclick="sharePage()">
مشاركة الصفحة
</button>

<p style="margin-top:20px">
🙏 شكراً لدعمكم
</p>

</div>

</body>
</html>
