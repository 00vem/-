<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>دعم وتبرعات</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
direction:rtl;
}

.box{
background:#1e293b;
padding:30px;
border-radius:12px;
max-width:420px;
margin:auto;
}

.card{
background:#334155;
padding:15px;
margin-top:15px;
border-radius:8px;
}

button{
margin-top:10px;
padding:10px 18px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
font-size:16px;
}

.share{
background:#38bdf8;
}

.counter{
font-size:22px;
color:#facc15;
margin:10px 0;
}

input{
padding:8px;
border-radius:6px;
border:none;
margin-top:10px;
width:80%;
}

.thanks{
margin-top:15px;
color:#4ade80;
font-weight:bold;
}

img{
margin-top:10px;
border-radius:8px;
}

</style>

<script>

let supporters = 0;

function donate(){

let name = document.getElementById("name").value;

if(name===""){
name="صديق";
}

supporters++;

document.getElementById("counter").innerText=supporters;

document.getElementById("thanks").innerText =
"شكراً لدعمك يا " + name + " ❤️";

}

function copyText(text){
navigator.clipboard.writeText(text);
alert("تم نسخ الرقم");
}

function sharePage(){
if (navigator.share){
navigator.share({
title:"صفحة التبرعات",
url:window.location.href
});
}else{
alert("انسخ الرابط وشاركه مع أصدقائك");
}
}

</script>

</head>

<body>

<div class="box">

<h1>💰 دعم وتبرعات</h1>

<p>إذا حبيت تدعمني أو تساهم بتبرع ❤️</p>

<p style="color:#38bdf8;font-size:20px;">
مبلغ التبرع المقترح: أي مبلغ هدية
</p>

<input id="name" placeholder="اكتب اسمك (اختياري)">

<div class="counter">
عدد الداعمين: <span id="counter">0</span>
</div>

<div class="card">

<h3>ZainCash</h3>

<p>07717980579</p>

<button onclick="copyText('07717980579')">
نسخ الرقم
</button>

<br><br>

<a href="tel:07717980579">
<button onclick="donate()">تحويل الآن</button>
</a>

<br>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=07717980579">

</div>

<div class="card">

<h3>Rafidain Bank</h3>

<p>9924257364</p>

<button onclick="copyText('9924257364')">
نسخ الرقم
</button>

</div>

<div class="card">

<h3>PayPal</h3>

<a href="https://paypal.me/ali2019">
<button onclick="donate()">الدفع عبر PayPal</button>
</a>

</div>

<p id="thanks" class="thanks"></p>

<br>

<button class="share" onclick="sharePage()">
مشاركة الصفحة
</button>

</div>

</body>
</html>
