<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💰 دعم وتبرعات</title>

<meta property="og:title" content="💰 دعم وتبرعات">
<meta property="og:description" content="إذا حبيت تدعمني أو تساهم بتبرع ❤️">
<meta property="og:image" content="logo.PNG">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Cairo',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
text-align:center;
padding:30px;
}

.container{
max-width:600px;
margin:auto;
}

.logo-box{
position:relative;
display:inline-block;
margin-bottom:25px;
}

.logo{
width:220px;
animation:float 5s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-12px)}
100%{transform:translateY(0)}
}

.shine{
position:absolute;
top:0;
left:-70%;
width:50%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,215,0,0.8),transparent);
animation:shineMove 4s infinite;
}

@keyframes shineMove{
100%{left:120%}
}

.coin{
position:absolute;
width:40px;
animation:coinFloat 6s infinite linear;
}

.coin1{top:-20px;left:-30px}
.coin2{top:30px;right:-30px}
.coin3{bottom:-10px;left:50px}

@keyframes coinFloat{
0%{transform:translateY(0) rotate(0deg)}
50%{transform:translateY(-25px) rotate(180deg)}
100%{transform:translateY(0) rotate(360deg)}
}

.card{
background:#1e293b;
padding:20px;
margin-top:15px;
border-radius:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

.share{
background:#38bdf8;
}

.qr{
width:180px;
margin-top:10px;
}

.progress{
background:#334155;
border-radius:20px;
overflow:hidden;
height:20px;
margin-top:10px;
}

.progress-bar{
height:100%;
background:#22c55e;
width:0%;
transition:1s;
}

.donors{
margin-top:15px;
text-align:right;
}

.admin{
background:#111827;
padding:20px;
border-radius:15px;
margin-top:20px;
}

.notification{
position:fixed;
top:20px;
right:20px;
background:#22c55e;
padding:12px 18px;
border-radius:10px;
display:none;
}

</style>
</head>

<body>

<div class="notification" id="notify">
🎉 وصل تبرع جديد!
</div>

<div class="container">

<div class="logo-box">

<img class="logo" src="logo.PNG">

<div class="shine"></div>

<img class="coin coin1" src="https://cdn-icons-png.flaticon.com/512/138/138292.png">
<img class="coin coin2" src="https://cdn-icons-png.flaticon.com/512/138/138292.png">
<img class="coin coin3" src="https://cdn-icons-png.flaticon.com/512/138/138292.png">

</div>

<h1>💰 دعم وتبرعات</h1>
<p>إذا حبيت تدعمني أو تساهم بتبرع ❤️</p>

<div class="card">

<h3>🎯 هدف التبرعات</h3>

<b id="donations">0$</b>
<p>إجمالي التبرعات</p>

<b id="donors">0</b>
<p>عدد المتبرعين</p>

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

</div>

<div class="card">

<h3>ZainCash</h3>

<img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=07717980579">

<button onclick="donate()">تبرعت عبر ZainCash</button>

</div>

<div class="card">

<h3>💳 سوبر كي</h3>

<p style="font-size:22px;font-weight:bold;">
9924257364
</p>

<button onclick="copySuperKey()">
نسخ الرقم
</button>

</div>

<div class="card">

<h3>PayPal</h3>

<a href="https://paypal.me/ali2019">

<button>الدفع عبر PayPal</button>

</a>

</div>

<div class="card donors">

<h3>👥 قائمة المتبرعين</h3>

<ul id="list"></ul>

</div>

<div class="admin">

<h3>⚙️ لوحة التحكم</h3>

<input id="name" placeholder="اسم المتبرع">
<input id="amount" placeholder="المبلغ">

<button onclick="addDonation()">إضافة تبرع</button>

<button onclick="resetData()">تصفير البيانات</button>

</div>

<button class="share" onclick="sharePage()">📤 مشاركة الصفحة</button>

</div>

<script>

let goal=500

let donations=localStorage.getItem("donations")||0
let donors=localStorage.getItem("donors")||0
let list=JSON.parse(localStorage.getItem("list")||"[]")

update()

function donate(){

let name=prompt("اسمك؟")
let amount=prompt("المبلغ؟")

if(name&&amount){

add(name,amount)

}

}

function addDonation(){

let name=document.getElementById("name").value
let amount=document.getElementById("amount").value

if(name&&amount){

add(name,amount)

}

}

function add(name,amount){

donations=Number(donations)+Number(amount)
donors++

list.push(name+" - $"+amount)

localStorage.setItem("donations",donations)
localStorage.setItem("donors",donors)
localStorage.setItem("list",JSON.stringify(list))

notify()

update()

}

function update(){

document.getElementById("donations").innerText=donations+"$"
document.getElementById("donors").innerText=donors

let percent=(donations/goal)*100
document.getElementById("bar").style.width=percent+"%"

let ul=document.getElementById("list")
ul.innerHTML=""

list.slice().reverse().forEach(d=>{
let li=document.createElement("li")
li.innerText=d
ul.appendChild(li)
})

}

function notify(){

let n=document.getElementById("notify")
n.style.display="block"

setTimeout(()=>{
n.style.display="none"
},3000)

}

function resetData(){

localStorage.clear()
location.reload()

}

function sharePage(){

if(navigator.share){

navigator.share({
title:"صفحة التبرعات",
url:window.location.href
})

}else{

alert("انسخ الرابط وشاركه")

}

}

function copySuperKey(){

navigator.clipboard.writeText("9924257364")
alert("تم نسخ رقم سوبر كي")

}

</script>

</body>
</html>
