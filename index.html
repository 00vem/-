<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💰 دعم وتبرعات</title>

<meta property="og:title" content="💰 دعم وتبرعات">
<meta property="og:description" content="إذا حبيت تدعمني أو تساهم بتبرع ❤️">
<meta property="og:image" content="logo.PNG">
<meta property="og:type" content="website">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Cairo',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
text-align:center;
padding:30px;
}

.container{
max-width:500px;
margin:auto;
}

.logo-box{
position:relative;
display:inline-block;
margin-bottom:20px;
}

.logo{
width:200px;
border-radius:20px;
animation:float 4s ease-in-out infinite;
position:relative;
z-index:2;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

.shine{
position:absolute;
top:0;
left:-75%;
width:50%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,215,0,0.7),transparent);
animation:shineMove 3s infinite;
z-index:3;
}

@keyframes shineMove{
100%{left:125%}
}

.coin{
position:absolute;
width:40px;
animation:coinFloat 6s infinite linear;
}

.coin1{top:-10px;left:-20px}
.coin2{top:20px;right:-20px}
.coin3{bottom:-10px;left:30px}

@keyframes coinFloat{
0%{transform:translateY(0) rotate(0deg)}
50%{transform:translateY(-20px) rotate(180deg)}
100%{transform:translateY(0) rotate(360deg)}
}

.card{
background:#1e293b;
padding:20px;
margin-top:15px;
border-radius:15px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

.qr{
width:180px;
margin-top:10px;
}

.progress{
background:#334155;
border-radius:20px;
overflow:hidden;
height:20px;
margin-top:10px;
}

.progress-bar{
height:100%;
background:#22c55e;
width:0%;
transition:1s;
}

</style>
</head>

<body>

<div class="container">

<div class="logo-box">

<img class="logo" src="logo.PNG">

<div class="shine"></div>

<img class="coin coin1" src="https://cdn-icons-png.flaticon.com/512/138/138292.png">
<img class="coin coin2" src="https://cdn-icons-png.flaticon.com/512/138/138292.png">
<img class="coin coin3" src="https://cdn-icons-png.flaticon.com/512/138/138292.png">

</div>

<h1>💰 دعم وتبرعات</h1>
<p>إذا حبيت تدعمني ❤️</p>

<div class="card">

<h3>🎯 هدف التبرعات</h3>

<b id="donations">0$</b>
<p>إجمالي التبرعات</p>

<b id="donors">0</b>
<p>عدد المتبرعين</p>

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

</div>

<div class="card">

<h3>ZainCash</h3>

<img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=07717980579">

<button onclick="donate()">تبرعت</button>

</div>

<div class="card">

<h3>💳 سوبر كي</h3>

<p style="font-size:20px;font-weight:bold;">9924257364</p>

<button onclick="copySuperKey()">نسخ الرقم</button>

</div>

<div class="card">

<h3>PayPal</h3>

<a href="https://paypal.me/ali2019">
<button>الدفع عبر PayPal</button>
</a>

</div>

</div>

<script>

let goal=500
let donations=0
let donors=0

function donate(){

let name=prompt("اسم المتبرع")
let amount=prompt("المبلغ")

if(name && amount){

donations+=Number(amount)
donors++

document.getElementById("donations").innerText=donations+"$"
document.getElementById("donors").innerText=donors

let percent=(donations/goal)*100
document.getElementById("bar").style.width=percent+"%"

alert("شكراً لدعمك ❤️")

}

}

function copySuperKey(){

navigator.clipboard.writeText("9924257364")
alert("تم نسخ رقم سوبر كي")

}

</script>

</body>
</html>
